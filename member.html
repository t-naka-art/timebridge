<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeBridge — メンバー</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;min-height:100vh;padding:16px}
:root{--bg1:#fff;--bg2:#f5f5f5;--bg3:#eee;--t1:#111;--t2:#555;--t3:#999;--b1:#e0e0e0;--b2:#ccc;--purple:#534AB7;--pl:#EEEDFE;--pd:#3C3489}
.wrap{max-width:600px;margin:0 auto}
a.back{font-size:12px;color:var(--purple);text-decoration:none;display:inline-block;margin-bottom:8px}
.card{background:var(--bg1);border:0.5px solid var(--b1);border-radius:12px;overflow:hidden;margin-bottom:12px}
.card-head{padding:12px 16px;border-bottom:0.5px solid var(--b1);font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.badge{display:inline-block;font-size:10px;padding:3px 8px;border-radius:6px;font-weight:500}
.badge-ok{background:#EAF3DE;color:#27500A}
.badge-warn{background:#FAEEDA;color:#633806}
.badge-gray{background:var(--bg2);color:var(--t2)}
.badge-purple{background:var(--pl);color:var(--pd)}
.badge-danger{background:#FCEBEB;color:#791F1F}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px}
.member-btn{background:var(--bg2);border:0.5px solid var(--b1);border-radius:10px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background 0.15s;text-align:left;width:100%}
.member-btn:hover{background:var(--pl);border-color:#AFA9EC}
.tabs{display:flex;border-bottom:0.5px solid var(--b1);padding:0 16px}
.tab{padding:10px 12px;font-size:13px;color:var(--t2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:500}
.sec{display:none;padding:14px 16px}.sec.active{display:block}
.form-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-field label{font-size:12px;color:var(--t2)}
.form-field input,.form-field select,.form-field textarea{font-size:13px;border-radius:8px;border:0.5px solid var(--b2);padding:7px 10px;background:var(--bg1);color:var(--t1);font-family:inherit}
.form-field textarea{resize:none;line-height:1.5}
.btn-primary{background:var(--purple);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer}
.btn-secondary{background:transparent;color:var(--t2);border:0.5px solid var(--b2);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}
.clock-area{padding:24px 16px;text-align:center}
.clock-time{font-size:44px;font-weight:300;letter-spacing:-1px;font-variant-numeric:tabular-nums;margin-bottom:4px}
.clock-date{font-size:13px;color:var(--t2);margin-bottom:24px}
.btn-clock{border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;padding:14px 44px;margin-bottom:10px}
.btn-in{background:var(--purple);color:#fff}.btn-in:hover{background:var(--pd)}
.btn-out{background:#FCEBEB;color:#791F1F}.btn-out:hover{background:#f5d5d5}
.btn-break{background:var(--bg2);color:var(--t2);border:0.5px solid var(--b2);border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer}
.mc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px}
.mc{background:var(--bg2);border-radius:8px;padding:12px}
.mc-label{font-size:11px;color:var(--t2);margin-bottom:4px}
.mc-val{font-size:18px;font-weight:500}
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:14px 16px}
.day-col{text-align:center}
.day-label{font-size:10px;color:var(--t3);margin-bottom:4px}
.day-bar-bg{height:48px;background:var(--bg2);border-radius:4px;display:flex;align-items:flex-end;overflow:hidden}
.day-bar{width:100%;border-radius:4px}
.day-val{font-size:10px;margin-top:3px}
.change-btn{font-size:11px;color:var(--purple);background:none;border:none;cursor:pointer}
.topbar{background:var(--bg1);border:0.5px solid var(--b1);border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back">← ロール選択</a>

  <!-- メンバー選択 -->
  <div id="screen-select">
    <div class="card">
      <div class="card-head">あなたは誰ですか？<span style="font-size:11px;color:var(--t3)">名前を選んでください</span></div>
      <div class="member-grid" id="member-grid"></div>
    </div>
  </div>

  <!-- 打刻画面 -->
  <div id="screen-clock" style="display:none">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <div id="u-av" class="av" style="width:36px;height:36px;font-size:13px"></div>
        <div><div style="font-size:14px;font-weight:500" id="u-name"></div><div style="font-size:11px;color:var(--t3)" id="u-role"></div></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge" id="status-badge">未打刻</span>
        <button class="change-btn" onclick="changeMember()">変更</button>
      </div>
    </div>

    <div class="card">
      <div class="clock-area">
        <div class="clock-time" id="clock">--:--:--</div>
        <div class="clock-date" id="clock-date"></div>
        <div style="margin-bottom:10px"><button class="btn-clock btn-in" id="main-btn" onclick="toggleClock()">出勤する</button></div>
        <div style="margin-bottom:10px"><button class="btn-break" id="break-btn" onclick="toggleBreak()" style="display:none">☕ 休憩を開始</button></div>
        <div style="font-size:12px;color:var(--t3)" id="clock-info">本日はまだ打刻していません</div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">本日のサマリー</div>
      <div class="mc-grid">
        <div class="mc"><div class="mc-label">実労働時間</div><div class="mc-val" id="today-h">0:00</div><div style="font-size:11px;color:var(--t3);margin-top:2px">目標 8h</div></div>
        <div class="mc"><div class="mc-label">出勤時刻</div><div class="mc-val" id="today-in" style="font-size:16px">—</div></div>
        <div class="mc"><div class="mc-label">退勤時刻</div><div class="mc-val" id="today-out" style="font-size:16px">—</div></div>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="showTab('week',this)">今週</button>
        <button class="tab" onclick="showTab('record',this)">出退勤記録</button>
        <button class="tab" onclick="showTab('shift',this)">シフト</button>
        <button class="tab" onclick="showTab('req',this)">修正申請</button>
      </div>

      <div id="sec-week" class="sec active">
        <div class="week-grid" id="week-grid"></div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--t2);padding-bottom:6px">
          <span>今週の合計</span><span id="week-total" style="font-weight:500">—</span>
        </div>
      </div>

      <div id="sec-record" class="sec">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <button id="rec-prev" style="border:none;background:none;cursor:pointer;font-size:20px;color:var(--purple)">&#8249;</button>
          <span style="font-size:13px;font-weight:500" id="rec-month-label"></span>
          <button id="rec-next" style="border:none;background:none;cursor:pointer;font-size:20px;color:var(--purple)">&#8250;</button>
        </div>
        <div style="display:flex;gap:16px;font-size:12px;color:var(--t2);margin-bottom:12px;flex-wrap:wrap">
          <span>合計: <strong id="rec-total-h">—</strong></span>
          
          <span>遅刻: <strong id="rec-late">—</strong></span>
        </div>
        <div id="rec-table" style="overflow-x:auto"></div>
      </div>

      <div id="sec-shift" class="sec">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <button id="shift-prev" style="border:none;background:none;cursor:pointer;font-size:20px;color:var(--purple)">&#8249;</button>
          <span style="font-size:13px;font-weight:500;color:var(--t1)" id="shift-month-label"></span>
          <button id="shift-next" style="border:none;background:none;cursor:pointer;font-size:20px;color:var(--purple)">&#8250;</button>
        </div>
        <div id="shift-calendar" style="margin-bottom:12px"></div>
        <div style="display:flex;gap:12px;font-size:11px;color:var(--t2);margin-bottom:12px">
          <span><span style="display:inline-block;width:10px;height:10px;background:#EEEDFE;border-radius:2px;margin-right:3px;vertical-align:middle"></span>登録済み</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:var(--bg2);border-radius:2px;margin-right:3px;vertical-align:middle"></span>未登録</span>
        </div>
        <div style="border-top:0.5px solid var(--b1);padding-top:14px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <span style="font-size:13px;font-weight:500">一括登録</span>
            <label style="font-size:12px;color:var(--t2);display:flex;align-items:center;gap:6px;cursor:pointer">
              <input type="checkbox" id="sf-include-weekend"> 土日も含める
            </label>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
            <div class="form-field"><label>出勤時刻</label><input type="time" id="sf-bulk-in" value="10:00"></div>
            <div class="form-field"><label>退勤時刻</label><input type="time" id="sf-bulk-out" value="18:00"></div>
          </div>
          <div class="form-field"><label>メモ（任意）</label><input type="text" id="sf-bulk-note" placeholder="在宅 / 出社 など"></div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn-secondary" id="btn-clear-shift">今月をクリア</button>
            <button class="btn-primary" id="btn-bulk-shift">一括登録</button>
          </div>
        </div>
      </div>

      <div id="sec-req" class="sec">
        <div id="req-list" style="margin-bottom:14px"></div>
        <div style="border-top:0.5px solid var(--b1);padding-top:14px">
          <div style="font-size:13px;font-weight:500;margin-bottom:12px">修正リクエストを申請</div>
          <div class="form-field"><label>対象日</label><input type="date" id="f-date"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="form-field"><label>修正前：出勤</label><input type="time" id="f-old-in"></div>
            <div class="form-field"><label>修正前：退勤</label><input type="time" id="f-old-out"></div>
            <div class="form-field"><label>修正後：出勤</label><input type="time" id="f-new-in"></div>
            <div class="form-field"><label>修正後：退勤</label><input type="time" id="f-new-out"></div>
          </div>
          <div class="form-field"><label>修正区分</label><select id="f-cat"><option>打刻漏れ</option><option>打刻ミス（時刻）</option><option>システム障害</option><option>その他</option></select></div>
          <div class="form-field"><label>理由</label><textarea id="f-reason" rows="3" placeholder="修正理由を入力してください"></textarea></div>
          <div style="text-align:right"><button class="btn-primary" id="btn-submit-req">申請する</button></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== データ取得 =====
// メンバーデータ（管理者で変更した場合はここも更新してください）
var MEMBER_DATA = (function(){
  // まずlocalStorageを試みる
  try{
    var raw = localStorage.getItem('tb_members');
    if(raw && raw !== 'null'){
      var parsed = JSON.parse(raw);
      if(Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  }catch(e){}
  // なければデフォルト
  return [
    {id:1,name:'我那覇',initials:'我',tz:'🇯🇵 JST',role:'スタッフ',color:'#EEEDFE',textColor:'#3C3489',hourlyRate:1500,salaryType:'hourly'},
    {id:2,name:'Priya',initials:'Pr',tz:'🇮🇳 IST',role:'スタッフ',color:'#E1F5EE',textColor:'#085041',hourlyRate:1500,salaryType:'hourly'},
  ];
})();

function defaultMembers(){ return MEMBER_DATA; }
function getMembers(){ return MEMBER_DATA; }
function loadMembersForDisplay(){ return MEMBER_DATA; }
function getStore(id){ try{ return JSON.parse(localStorage.getItem('tb_clk_'+id)||'{}'); }catch{ return {}; } }
function saveStore(id,d){ try{ localStorage.setItem('tb_clk_'+id,JSON.stringify(d)); }catch{} }
function getShifts(id){ try{ return JSON.parse(localStorage.getItem('tb_shifts_'+id)||'[]'); }catch{ return []; } }
function saveShifts(id,d){ try{ localStorage.setItem('tb_shifts_'+id,JSON.stringify(d)); }catch{} }
function getReqs(id){ try{ return JSON.parse(localStorage.getItem('tb_reqs_'+id)||'[]'); }catch{ return []; } }
function saveReqs(id,d){ try{ localStorage.setItem('tb_reqs_'+id,JSON.stringify(d)); }catch{} }

// ===== 状態変数（全部まとめてここで宣言）=====
var cur = null;
var clockTimer = null;
var shiftMonth = new Date();
shiftMonth.setDate(1);
var st = { clocked:false, onBreak:false, clockInTime:null, clockOutTime:null, breakStart:null, totalBreakMin:0 };

// ===== メンバー選択グリッド =====
function renderMemberGrid(){
  var MEMBERS = MEMBER_DATA;
  var grid = document.getElementById('member-grid');
  if(!grid){ console.error('member-grid not found'); return; }
  grid.innerHTML = '';
  console.log('renderMemberGrid called, members:', MEMBERS.length);
  MEMBERS.forEach(function(m){
    var btn = document.createElement('button');
    btn.className = 'member-btn';
    btn.style.cssText = 'background:#f5f5f5;border:0.5px solid #e0e0e0;border-radius:10px;padding:14px;cursor:pointer;display:flex;align-items:center;gap:12px;text-align:left;width:100%';
    var av = document.createElement('div');
    av.style.cssText = 'width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;background:'+(m.color||'#EEEDFE')+';color:'+(m.textColor||'#3C3489');
    av.textContent = m.initials||'?';
    var info = document.createElement('div');
    var name = document.createElement('div');
    name.style.cssText = 'font-size:13px;font-weight:500;color:#111';
    name.textContent = m.name||'名前なし';
    var role = document.createElement('div');
    role.style.cssText = 'font-size:11px;color:#999';
    role.textContent = (m.tz||'') + (m.role?' · '+m.role:'');
    info.appendChild(name);
    info.appendChild(role);
    btn.appendChild(av);
    btn.appendChild(info);
    (function(member){
      btn.onclick = function(e){ e.preventDefault(); selectMember(member); };
    })(m);
    grid.appendChild(btn);
  });
}

// ===== メンバー選択 =====
function selectMember(m){
  cur = m;
  var s = getStore(m.id);
  st = {
    clocked: s.clocked||false,
    onBreak: false,
    clockInTime: s.clockInTime ? new Date(s.clockInTime) : null,
    clockOutTime: s.clockOutTime ? new Date(s.clockOutTime) : null,
    breakStart: null,
    totalBreakMin: s.totalBreakMin||0,
  };
  var uav = document.getElementById('u-av');
  uav.style.background = m.color;
  uav.style.color = m.textColor;
  uav.style.width = '36px';
  uav.style.height = '36px';
  uav.style.fontSize = '13px';
  uav.textContent = m.initials;
  document.getElementById('u-name').textContent = m.name;
  document.getElementById('u-role').textContent = m.tz + ' · ' + m.role;

  shiftMonth = new Date(); shiftMonth.setDate(1);
  updateClockUI();
  renderWeek(m.id);
  renderShifts(m.id);
  renderReqs(m.id);

  document.getElementById('screen-select').style.display = 'none';
  document.getElementById('screen-clock').style.display = 'block';

  if(clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(tick, 1000);
  tick();
}

function changeMember(){
  if(clockTimer) clearInterval(clockTimer);
  cur = null;
  renderMemberGrid();
  document.getElementById('screen-select').style.display = 'block';
  document.getElementById('screen-clock').style.display = 'none';
}

// ===== 時計 =====
function fmt(d){ return d ? d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false}) : '—'; }

function tick(){
  var now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  document.getElementById('clock-date').textContent = now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  if(st.clockInTime && !st.clockOutTime){
    var bm = st.totalBreakMin;
    if(st.onBreak && st.breakStart) bm += Math.round((now - st.breakStart)/60000);
    var tm = Math.max(0, Math.round((now - st.clockInTime)/60000) - bm);
    document.getElementById('today-h').textContent = Math.floor(tm/60) + ':' + (tm%60<10?'0':'') + tm%60;
  }
}

function updateClockUI(){
  var mb = document.getElementById('main-btn');
  var bb = document.getElementById('break-btn');
  var bd = document.getElementById('status-badge');
  var ci = document.getElementById('clock-info');
  if(st.clockOutTime){
    mb.textContent='出勤する（翌日）'; mb.className='btn-clock btn-in'; bb.style.display='none';
    bd.textContent='退勤済み'; bd.className='badge badge-gray';
    ci.textContent='退勤打刻完了 '+fmt(st.clockOutTime);
    document.getElementById('today-in').textContent=fmt(st.clockInTime);
    document.getElementById('today-out').textContent=fmt(st.clockOutTime);
  } else if(st.clocked){
    mb.textContent='退勤する'; mb.className='btn-clock btn-out'; bb.style.display='inline-block';
    bd.textContent=st.onBreak?'☕ 休憩中':'● 勤務中'; bd.className=st.onBreak?'badge badge-warn':'badge badge-ok';
    ci.textContent='出勤打刻完了 '+fmt(st.clockInTime);
    document.getElementById('today-in').textContent=fmt(st.clockInTime);
    document.getElementById('today-out').textContent='—';
  } else {
    mb.textContent='出勤する'; mb.className='btn-clock btn-in'; bb.style.display='none';
    bd.textContent='未打刻'; bd.className='badge badge-gray';
    ci.textContent='本日はまだ打刻していません';
  }
}

function toggleClock(){
  if(!st.clocked && !st.clockOutTime){
    st.clocked=true; st.clockInTime=new Date();
  } else if(st.clocked){
    st.clocked=false; st.clockOutTime=new Date();
  }
  saveStore(cur.id,{clocked:st.clocked,clockInTime:st.clockInTime?st.clockInTime.toISOString():null,clockOutTime:st.clockOutTime?st.clockOutTime.toISOString():null,totalBreakMin:st.totalBreakMin});
  updateClockUI();
  renderWeek(cur.id);
}

function toggleBreak(){
  var bb = document.getElementById('break-btn');
  if(!st.onBreak){
    st.onBreak=true; st.breakStart=new Date(); bb.textContent='☕ 休憩を終了';
  } else {
    st.onBreak=false; st.totalBreakMin+=Math.round((new Date()-st.breakStart)/60000); st.breakStart=null; bb.textContent='☕ 休憩を開始';
    saveStore(cur.id,{clocked:st.clocked,clockInTime:st.clockInTime?st.clockInTime.toISOString():null,clockOutTime:st.clockOutTime?st.clockOutTime.toISOString():null,totalBreakMin:st.totalBreakMin});
  }
  updateClockUI();
}

// ===== 今週 =====
var weekDemo={1:[8.0,7.5,9.5,7.0,0],2:[7.5,8.0,7.0,8.5,0],3:[9.0,8.0,10.0,7.5,0],4:[6.0,7.0,0,8.0,0],5:[8.0,8.5,7.5,8.0,0]};
function renderWeek(mid){
  var days=['月','火','水','木','金(今日)'], data=weekDemo[mid]||[0,0,0,0,0], maxH=Math.max.apply(null,data.concat(8)), total=data.reduce(function(s,h){return s+h;},0);
  document.getElementById('week-grid').innerHTML=days.map(function(d,i){
    var h=data[i], today=i===4;
    return '<div class="day-col"><div class="day-label" style="'+(today?'color:var(--purple);font-weight:500':'')+'">'+d+'</div>'+
      '<div class="day-bar-bg" style="'+(today?'border:1.5px solid var(--purple)':'')+'">'+
      '<div class="day-bar" style="height:'+(h?Math.round(h/maxH*100)+'%':'0%')+';background:'+(h>8?'#BA7517':'#534AB7')+'"></div></div>'+
      '<div class="day-val" style="color:'+(h>8?'#854F0B':today?'var(--purple)':'var(--t2)')+'">'+( h||'—')+(h?'h':'')+'</div></div>';
  }).join('');
  document.getElementById('week-total').textContent=total+'h';
}

// ===== シフト =====
function renderShifts(mid){
  var y=shiftMonth.getFullYear(), m=shiftMonth.getMonth();
  document.getElementById('shift-month-label').textContent=y+'年'+(m+1)+'月';
  var list=getShifts(mid);
  var adminShifts=[];
  try{ adminShifts=JSON.parse(localStorage.getItem('tb_admin_shifts')||'[]').filter(function(s){return s.memberId===mid;}); }catch{}
  var allShifts=list.concat(adminShifts);
  var daysInMonth=new Date(y,m+1,0).getDate();
  var firstDay=new Date(y,m,1).getDay();
  var dowLabels=['日','月','火','水','木','金','土'];
  var html='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">';
  dowLabels.forEach(function(d){ html+='<div style="text-align:center;font-size:10px;color:var(--t3);padding:2px">'+d+'</div>'; });
  html+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
  for(var i=0;i<firstDay;i++) html+='<div></div>';
  for(var d=1;d<=daysInMonth;d++){
    var mm=m+1; var dd=d;
    var date=y+'-'+(mm<10?'0':'')+mm+'-'+(dd<10?'0':'')+dd;
    var dow=new Date(y,m,d).getDay();
    var weekend=(dow===0||dow===6);
    var shift=allShifts.find(function(s){return s.date===date;});
    var today=new Date().toISOString().slice(0,10)===date;
    html+='<div data-date="'+date+'" style="text-align:center;padding:4px 2px;border-radius:6px;cursor:pointer;background:'+(shift?'#EEEDFE':weekend?'#FFF0F0':'var(--bg2)')+';border:'+(today?'1.5px solid #534AB7':'1.5px solid transparent')+';">'+
      '<div style="font-size:11px;font-weight:'+(today?600:400)+';color:'+(shift?'#3C3489':'var(--t1)')+'">'+d+'</div>'+
      (shift?'<div style="font-size:9px;color:#534AB7;line-height:1.3">'+shift.startTime+'<br>'+shift.endTime+'</div>':'')+
      '</div>';
  }
  html+='</div>';
  document.getElementById('shift-calendar').innerHTML=html;
  document.getElementById('shift-calendar').querySelectorAll('[data-date]').forEach(function(el){
    var date=el.getAttribute('data-date');
    el.onclick=function(){ clickDay(date, mid); };
  });
}

function clickDay(date, mid){
  var existing = getShifts(mid).find(function(s){ return s.date===date; });
  var old = document.getElementById('sem');
  if(old) old.remove();

  // オーバーレイ
  var overlay = document.createElement('div');
  overlay.id = 'sem';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px';

  // ダイアログ
  var box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:12px;padding:24px;width:100%;max-width:320px';

  // タイトル行
  var titleRow = document.createElement('div');
  titleRow.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px';
  var title = document.createElement('span');
  title.style.cssText = 'font-size:15px;font-weight:500';
  title.textContent = date + ' のシフト';
  var closeBtn = document.createElement('button');
  closeBtn.style.cssText = 'border:none;background:none;cursor:pointer;font-size:22px;color:#999';
  closeBtn.textContent = '×';
  closeBtn.onclick = function(){ overlay.remove(); };
  titleRow.appendChild(title);
  titleRow.appendChild(closeBtn);

  // 時刻グリッド
  var grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px';

  var inDiv = document.createElement('div');
  var inLabel = document.createElement('label');
  inLabel.style.cssText = 'font-size:12px;color:#555;display:block;margin-bottom:4px';
  inLabel.textContent = '出勤時刻';
  var inInput = document.createElement('input');
  inInput.type = 'time'; inInput.id = 'sem-in';
  inInput.value = existing ? existing.startTime : '10:00';
  inInput.style.cssText = 'width:100%;font-size:14px;border-radius:8px;border:1px solid #ddd;padding:8px 10px';
  inDiv.appendChild(inLabel); inDiv.appendChild(inInput);

  var outDiv = document.createElement('div');
  var outLabel = document.createElement('label');
  outLabel.style.cssText = 'font-size:12px;color:#555;display:block;margin-bottom:4px';
  outLabel.textContent = '退勤時刻';
  var outInput = document.createElement('input');
  outInput.type = 'time'; outInput.id = 'sem-out';
  outInput.value = existing ? existing.endTime : '18:00';
  outInput.style.cssText = 'width:100%;font-size:14px;border-radius:8px;border:1px solid #ddd;padding:8px 10px';
  outDiv.appendChild(outLabel); outDiv.appendChild(outInput);

  grid.appendChild(inDiv); grid.appendChild(outDiv);

  // メモ
  var noteDiv = document.createElement('div');
  noteDiv.style.cssText = 'margin-bottom:20px';
  var noteLabel = document.createElement('label');
  noteLabel.style.cssText = 'font-size:12px;color:#555;display:block;margin-bottom:4px';
  noteLabel.textContent = 'メモ（任意）';
  var noteInput = document.createElement('input');
  noteInput.type = 'text'; noteInput.id = 'sem-note';
  noteInput.value = existing ? (existing.note||'') : '';
  noteInput.placeholder = '在宅 / 出社 など';
  noteInput.style.cssText = 'width:100%;font-size:13px;border-radius:8px;border:1px solid #ddd;padding:8px 10px';
  noteDiv.appendChild(noteLabel); noteDiv.appendChild(noteInput);

  // ボタン行
  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;justify-content:space-between;align-items:center';

  var leftSide = document.createElement('span');
  if(existing){
    var delBtn = document.createElement('button');
    delBtn.style.cssText = 'font-size:12px;padding:7px 14px;border-radius:8px;background:#FCEBEB;color:#791F1F;border:none;cursor:pointer';
    delBtn.textContent = '削除';
    delBtn.onclick = function(){
      saveShifts(mid, getShifts(mid).filter(function(s){ return s.date!==date; }));
      renderShifts(mid);
      overlay.remove();
    };
    leftSide.appendChild(delBtn);
  }

  var rightSide = document.createElement('div');
  rightSide.style.cssText = 'display:flex;gap:8px';

  var cancelBtn = document.createElement('button');
  cancelBtn.style.cssText = 'font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:transparent;color:#555;cursor:pointer';
  cancelBtn.textContent = 'キャンセル';
  cancelBtn.onclick = function(){ overlay.remove(); };

  var saveBtn = document.createElement('button');
  saveBtn.style.cssText = 'font-size:13px;padding:8px 18px;border-radius:8px;border:none;background:#534AB7;color:#fff;cursor:pointer;font-weight:500';
  saveBtn.textContent = '保存する';
  saveBtn.onclick = function(){
    var si = document.getElementById('sem-in').value;
    var so = document.getElementById('sem-out').value;
    var note = document.getElementById('sem-note').value;
    var list = getShifts(mid);
    var eidx = list.findIndex(function(s){ return s.date===date; });
    var entry = {id:Date.now(),memberId:mid,date:date,startTime:si,endTime:so,note:note,status:'approved',
      submittedAt:new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric'})};
    if(eidx>=0) list[eidx]=entry; else list.push(entry);
    saveShifts(mid,list);
    renderShifts(mid);
    overlay.remove();
  };

  rightSide.appendChild(cancelBtn);
  rightSide.appendChild(saveBtn);
  btnRow.appendChild(leftSide);
  btnRow.appendChild(rightSide);

  box.appendChild(titleRow);
  box.appendChild(grid);
  box.appendChild(noteDiv);
  box.appendChild(btnRow);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

function renderReqs(mid){
  var list=getReqs(mid);
  document.getElementById('req-list').innerHTML=list.length===0
    ?'<div style="text-align:center;padding:16px;color:var(--t3);font-size:13px">申請中のリクエストはありません</div>'
    :list.map(function(r){
      return '<div style="background:var(--bg2);border-radius:8px;padding:12px;margin-bottom:8px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+
        '<span style="font-size:13px;font-weight:500">'+r.date+'</span>'+
        '<span class="badge '+(r.status==='pending'?'badge-purple':r.status==='approved'?'badge-ok':'badge-danger')+'">'+(r.status==='pending'?'審査中':r.status==='approved'?'承認済み':'却下')+'</span></div>'+
        '<div style="font-size:12px;color:var(--t2)">'+r.oldIn+'〜'+r.oldOut+' → '+r.newIn+'〜'+r.newOut+'</div>'+
        '<div style="font-size:11px;color:var(--t3);margin-top:2px">'+r.category+'</div></div>';
    }).join('');
}
document.getElementById('btn-submit-req').onclick=function(){
  if(!cur) return;
  var reason=document.getElementById('f-reason').value.trim();
  if(!reason){ alert('理由を入力してください'); return; }
  var list=getReqs(cur.id);
  list.unshift({
    id:Date.now(), memberId:cur.id,
    date:document.getElementById('f-date').value||new Date().toISOString().slice(0,10),
    oldIn:document.getElementById('f-old-in').value||'—',
    oldOut:document.getElementById('f-old-out').value||'—',
    newIn:document.getElementById('f-new-in').value||'—',
    newOut:document.getElementById('f-new-out').value||'—',
    category:document.getElementById('f-cat').value,
    reason:reason, status:'pending',
    appliedAt:new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric'})
  });
  saveReqs(cur.id,list);
  document.getElementById('f-reason').value='';
  renderReqs(cur.id);
  alert('申請しました！');
};

// ===== 出退勤記録 =====
var recMonth = new Date(); recMonth.setDate(1);

document.getElementById('rec-prev').onclick = function(){
  recMonth.setMonth(recMonth.getMonth()-1);
  if(cur) renderRecord(cur.id);
};
document.getElementById('rec-next').onclick = function(){
  recMonth.setMonth(recMonth.getMonth()+1);
  if(cur) renderRecord(cur.id);
};

function renderRecord(mid){
  var y=recMonth.getFullYear(), m=recMonth.getMonth();
  document.getElementById('rec-month-label').textContent=y+'年'+(m+1)+'月';
  var daysInMonth=new Date(y,m+1,0).getDate();
  var dowNames=['日','月','火','水','木','金','土'];

  // 今日の打刻データ
  var clkData={};
  try{ clkData=JSON.parse(localStorage.getItem('tb_clk_'+mid)||'{}'); }catch{}

  var demoByDate={};
  var demoHours=[8.0,7.5,9.5,7.0,0,0,8.2,8.0,7.8,9.0,0,0,8.0,7.5,8.5,8.0,7.0,0,0,8.3,8.0,9.2];
  var idx=0;
  for(var d=1;d<=daysInMonth;d++){
    var dow=new Date(y,m,d).getDay();
    if(dow!==0&&dow!==6){
      var mm2=m+1;
      var date2=y+'-'+(mm2<10?'0':'')+mm2+'-'+(d<10?'0':'')+d;
      demoByDate[date2]=demoHours[idx%demoHours.length];
      idx++;
    }
  }

  var totalH=0,totalOT=0,lateCount=0;
  var html='<table style="width:100%;border-collapse:collapse;font-size:12px">'+
    '<thead><tr style="background:var(--bg2)">'+
    '<th style="padding:7px 10px;text-align:left;font-size:11px">日付</th>'+
    '<th style="padding:7px 10px;text-align:left;font-size:11px">曜</th>'+
    '<th style="padding:7px 10px;text-align:left;font-size:11px">出勤</th>'+
    '<th style="padding:7px 10px;text-align:left;font-size:11px">退勤</th>'+
    '<th style="padding:7px 10px;text-align:right;font-size:11px">実働</th>'+
    '<th style="padding:7px 10px;font-size:11px"></th>'+
    '</tr></thead><tbody>';

  for(var d=1;d<=daysInMonth;d++){
    var mm=m+1;
    var date=y+'-'+(mm<10?'0':'')+mm+'-'+(d<10?'0':'')+d;
    var dow=new Date(y,m,d).getDay();
    var weekend=(dow===0||dow===6);
    var isToday=new Date().toISOString().slice(0,10)===date;
    var isFuture=date>new Date().toISOString().slice(0,10);
    var dowName=dowNames[dow];

    if(weekend){
      html+='<tr style="opacity:0.35"><td style="padding:7px 10px">'+d+'日</td><td style="padding:7px 10px;color:var(--t3)">'+dowName+'</td><td colspan="5" style="padding:7px 10px;font-size:11px;color:var(--t3)">休日</td></tr>';
      continue;
    }
    if(isFuture){
      html+='<tr style="opacity:0.35"><td style="padding:7px 10px">'+d+'日</td><td style="padding:7px 10px">'+dowName+'</td><td colspan="5" style="padding:7px 10px;font-size:11px;color:var(--t3)">—</td></tr>';
      continue;
    }

    var clockIn='—', clockOut='—', workH=0, late=false;

    if(isToday && clkData.clockInTime){
      clockIn=new Date(clkData.clockInTime).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false});
      if(clkData.clockOutTime){
        clockOut=new Date(clkData.clockOutTime).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false});
        var mins=Math.round((new Date(clkData.clockOutTime)-new Date(clkData.clockInTime))/60000)-(clkData.totalBreakMin||60);
        workH=Math.max(0,mins/60);
      }
      late=clockIn>'09:30';
    } else if(demoByDate[date]!==undefined){
      var h=demoByDate[date];
      if(h>0){
        clockIn='09:00'; workH=h;
        var endMin=9*60+Math.round(h*60)-60;
        clockOut=Math.floor(endMin/60)+':'+(endMin%60<10?'0':'')+(endMin%60);
      }
    }

    var ot=Math.max(0,workH-8);
    if(workH>0){ totalH+=workH; totalOT+=ot; }
    if(late) lateCount++;

    var badge='';
    if(workH===0) badge='<span class="badge badge-danger" style="font-size:9px">欠勤</span>';
    else if(late) badge='<span class="badge badge-warn" style="font-size:9px">遅刻</span>';
    else badge='<span class="badge badge-ok" style="font-size:9px">出勤</span>';
    if(isToday&&clkData.clocked&&!clkData.clockOutTime) badge='<span class="badge badge-ok" style="font-size:9px">勤務中</span>';

    html+='<tr style="border-bottom:0.5px solid var(--b1);'+(isToday?'background:#EEEDFE20':'')+'">'+
      '<td style="padding:7px 10px;font-weight:'+(isToday?600:400)+'">'+d+'日</td>'+
      '<td style="padding:7px 10px;color:var(--t2)">'+dowName+'</td>'+
      '<td style="padding:7px 10px">'+(late?'<span style="color:#854F0B">'+clockIn+'</span>':clockIn)+'</td>'+
      '<td style="padding:7px 10px">'+clockOut+'</td>'+
      '<td style="padding:7px 10px;text-align:right;font-weight:500">'+(workH>0?Math.floor(workH*60)+'分':'—')+'</td>'+
      '<td style="padding:7px 10px">'+badge+'</td>'+
      '</tr>';
  }
  html+='</tbody></table>';
  document.getElementById('rec-table').innerHTML=html;
  document.getElementById('rec-total-h').textContent=Math.round(totalH*10)/10+'h';
  document.getElementById('rec-ot-h').textContent=Math.round(totalOT*10)/10+'h';
  document.getElementById('rec-late').textContent=lateCount+'回';
}

// ===== タブ切替 =====
function showTab(id,el){
  document.querySelectorAll('.sec').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('sec-'+id).classList.add('active');
  if(el) el.classList.add('active');
  if(id==='record' && cur) renderRecord(cur.id);
}

// ===== ボタンハンドラ =====
document.getElementById('shift-prev').onclick=function(){
  shiftMonth.setMonth(shiftMonth.getMonth()-1);
  if(cur) renderShifts(cur.id);
};
document.getElementById('shift-next').onclick=function(){
  shiftMonth.setMonth(shiftMonth.getMonth()+1);
  if(cur) renderShifts(cur.id);
};
document.getElementById('btn-bulk-shift').onclick=function(){
  if(!cur) return;
  var si=document.getElementById('sf-bulk-in').value||'10:00';
  var so=document.getElementById('sf-bulk-out').value||'18:00';
  var note=document.getElementById('sf-bulk-note').value||'';
  var inclWeekend=document.getElementById('sf-include-weekend')&&document.getElementById('sf-include-weekend').checked;
  var y=shiftMonth.getFullYear(), m=shiftMonth.getMonth();
  var daysInMonth=new Date(y,m+1,0).getDate();
  var list=getShifts(cur.id);
  for(var d=1;d<=daysInMonth;d++){
    var dow=new Date(y,m,d).getDay();
    if(!inclWeekend&&(dow===0||dow===6)) continue;
    var mm=m+1;
    var date=y+'-'+(mm<10?'0':'')+mm+'-'+(d<10?'0':'')+d;
    var eidx=list.findIndex(function(s){return s.date===date;});
    var entry={id:Date.now()+d,memberId:cur.id,date:date,startTime:si,endTime:so,note:note,status:'approved',submittedAt:new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric'})};
    if(eidx>=0) list[eidx]=entry; else list.push(entry);
  }
  saveShifts(cur.id,list);
  renderShifts(cur.id);
  alert((m+1)+'月のシフトを登録しました！');
};
document.getElementById('btn-clear-shift').onclick=function(){
  if(!cur) return;
  if(!confirm('今月のシフトをすべてクリアしますか？')) return;
  var y=shiftMonth.getFullYear(), m=shiftMonth.getMonth();
  var list=getShifts(cur.id).filter(function(s){
    var sd=new Date(s.date);
    return !(sd.getFullYear()===y&&sd.getMonth()===m);
  });
  saveShifts(cur.id,list);
  renderShifts(cur.id);
};
