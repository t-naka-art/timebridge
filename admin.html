<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeBridge — 管理者</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;min-height:100vh;padding:16px}
:root{--bg1:#fff;--bg2:#f5f5f5;--bg3:#eee;--t1:#111;--t2:#555;--t3:#999;--b1:#e0e0e0;--b2:#ccc;--purple:#534AB7;--pl:#EEEDFE;--pd:#3C3489}
.wrap{max-width:1100px;margin:0 auto}
a.back{font-size:12px;color:var(--purple);text-decoration:none;display:inline-block;margin-bottom:8px}
.topbar{background:var(--bg1);border:0.5px solid var(--b1);border-radius:12px 12px 0 0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.tabs{display:flex;background:var(--bg1);border:0.5px solid var(--b1);border-top:none;padding:0 20px}
.tab{padding:10px 14px;font-size:13px;color:var(--t2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-0.5px}
.tab.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:500}
.content{background:var(--bg3);border:0.5px solid var(--b1);border-top:none;border-radius:0 0 12px 12px;padding:16px}
.sec{display:none}.sec.active{display:block}
.card{background:var(--bg1);border:0.5px solid var(--b1);border-radius:12px;overflow:hidden;margin-bottom:14px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid var(--b1)}
.card-title{font-size:13px;font-weight:500}
.badge{display:inline-block;font-size:10px;padding:3px 8px;border-radius:6px;font-weight:500}
.badge-ok{background:#EAF3DE;color:#27500A}
.badge-warn{background:#FAEEDA;color:#633806}
.badge-gray{background:var(--bg2);color:var(--t2)}
.badge-purple{background:var(--pl);color:var(--pd)}
.badge-danger{background:#FCEBEB;color:#791F1F}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.mc{background:var(--bg2);border-radius:8px;padding:12px 14px}
.mc-label{font-size:11px;color:var(--t2);margin-bottom:4px}
.mc-val{font-size:20px;font-weight:500}
.mc-sub{font-size:11px;margin-top:2px;color:var(--t3)}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;color:var(--t2);font-weight:500;border-bottom:0.5px solid var(--b1);background:var(--bg2);font-size:11px}
td{padding:9px 12px;border-bottom:0.5px solid var(--b1);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.btn{font-size:12px;padding:5px 10px;border-radius:8px;border:0.5px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--purple);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer}
.btn-primary:hover{background:var(--pd)}
.btn-danger{background:#FCEBEB;color:#791F1F;border:none;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer}
.form-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-field label{font-size:12px;color:var(--t2)}
.form-field input,.form-field select,.form-field textarea{font-size:13px;border-radius:8px;border:0.5px solid var(--b2);padding:7px 10px;background:var(--bg1);color:var(--t1);font-family:inherit;width:100%}
.prog-bg{background:var(--bg2);border-radius:4px;height:5px;width:60px;overflow:hidden;display:inline-block;vertical-align:middle}
.prog-fill{height:100%;border-radius:4px}
.shift-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:0.5px solid var(--b1)}
.shift-row:last-child{border-bottom:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.open{display:flex}
.modal{background:var(--bg1);border-radius:12px;padding:24px;width:480px;max-width:92vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:4px}
.color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.color-swatch.selected{border-color:#534AB7}
.ai-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:0.5px solid var(--b1)}
</style>
</head>
<body>
<script>
if(sessionStorage.getItem("tb_admin_auth")!=="1"){location.href="index.html";}
</script>
<div class="wrap">
  <a href="index.html" class="back">← ロール選択</a>
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:15px;font-weight:500">TimeBridge</span>
      <span class="badge badge-purple">管理者</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:var(--t3)" id="today-label"></span><button class="btn" onclick="openPwModal()" style="font-size:11px"><i class="ti ti-lock"></i> PW変更</button><button class="btn" onclick="resetMembersData()" style="font-size:11px;color:#854F0B"><i class="ti ti-refresh"></i> リセット</button><button class="btn" onclick="resetAllAttendance()" style="font-size:11px;color:#791F1F;border-color:#FCEBEB;background:#FCEBEB"><i class="ti ti-trash"></i> 勤怠全削除</button><button class="btn" onclick="logout()" style="font-size:11px"><i class="ti ti-logout"></i> ログアウト</button></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('report',this)">勤怠レポート</button>
    <button class="tab" onclick="showTab('payroll',this)">給与計算</button>
    <button class="tab" onclick="showTab('shifts',this)">シフト管理</button>
    <button class="tab" onclick="showTab('attendance',this)">出退勤記録</button>
    <button class="tab" onclick="showTab('requests',this)">修正リクエスト <span class="badge badge-danger" id="req-badge" style="display:none"></span></button>
    <button class="tab" onclick="showTab('members',this)">メンバー管理</button>
  </div>
  <div class="content">

    <!-- 勤怠レポート -->
    <div id="sec-report" class="sec active">
      <div class="metrics" id="report-metrics"></div>
      <div class="card">
        <div class="card-head">
          <span class="card-title">メンバー別勤務時間</span>
          <button class="btn" onclick="exportAttendanceCSV()"><i class="ti ti-download"></i>全員CSV</button>
        </div>
        <table><thead><tr><th>メンバー</th><th>勤務時間</th><th>達成率</th><th>遅刻</th><th>ステータス</th></tr></thead>
        <tbody id="attendance-tbody"></tbody></table>
        <div class="ai-row">
          <div style="width:20px;height:20px;background:var(--pl);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">✨</div>
          <div style="font-size:12px;color:var(--t2)" id="report-ai">集計中...</div>
        </div>
      </div>
    </div>

    <!-- 給与計算 -->
    <div id="sec-payroll" class="sec">
      <div class="metrics" style="grid-template-columns:repeat(3,1fr)" id="payroll-metrics"></div>
      <div class="card">
        <div class="card-head">
          <span class="card-title">給与計算明細</span>
          <button class="btn" onclick="exportPayrollCSV()"><i class="ti ti-download"></i>CSV</button>
        </div>
        <table>
          <thead><tr><th>メンバー</th><th style="text-align:right">単価</th><th style="text-align:right">勤務合計時間</th><th style="text-align:right">合計支給額</th></tr></thead>
          <tbody id="payroll-tbody"></tbody>
          <tfoot><tr style="background:var(--bg2)"><td colspan="6" style="padding:10px 12px;font-weight:500">合計</td><td style="padding:10px 12px;text-align:right;font-weight:500;color:var(--pd)" id="grand-total">—</td></tr></tfoot>
        </table>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">時給設定</span><span style="font-size:11px;color:var(--t3)">クリックして編集</span></div>
        <div style="padding:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px" id="hourly-grid"></div>
      </div>
    </div>

    <!-- シフト管理 -->
    <div id="sec-shifts" class="sec">
      <!-- 今日の出勤者 -->
      <div class="card" style="margin-bottom:14px">
        <div class="card-head">
          <span class="card-title">📍 今日の出勤予定</span>
          <span style="font-size:11px;color:var(--t3)" id="today-shift-date"></span>
        </div>
        <div id="today-shift-list"></div>
      </div>
      <!-- シフト表示切り替え -->
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn active-view-btn" id="btn-view-all" onclick="setShiftView('all',this)" style="background:#534AB7;color:#fff;border-color:#534AB7">全員表示</button>
        <button class="btn" id="btn-view-member" onclick="setShiftView('member',this)">メンバー別</button>
      </div>
      <!-- 全員シフトカレンダー -->
      <div id="all-shifts-card" class="card">
        <div class="card-head">
          <span class="card-title">全員シフト一覧</span>
          <div style="display:flex;align-items:center;gap:8px">
            <button onclick="allShiftMonthDelta(-1)" style="border:none;background:none;cursor:pointer;font-size:18px;color:var(--purple)">&#8249;</button>
            <span style="font-size:13px;font-weight:500" id="all-shift-month-label"></span>
            <button onclick="allShiftMonthDelta(1)" style="border:none;background:none;cursor:pointer;font-size:18px;color:var(--purple)">&#8250;</button>
          </div>
        </div>
        <div style="padding:14px 16px;overflow-x:auto" id="all-shifts-table"></div>
      </div>
      <!-- メンバー別カレンダー -->
      <div id="member-shift-card" class="card" style="display:none">
        <div class="card-head">
          <span class="card-title">メンバー別シフトカレンダー</span>
          <span class="badge badge-danger" id="shift-pending-count" style="display:none"></span>
        </div>
        <div style="padding:14px 16px" id="pending-shifts"></div>
      </div>
      <div id="approved-shifts"></div>
    </div>

    <!-- 修正リクエスト -->
    <div id="sec-requests" class="sec">
      <div class="card">
        <div class="card-head">
          <span class="card-title">未処理の修正リクエスト</span>
          <div style="display:flex;gap:8px">
            <span class="badge badge-danger" id="req-pending-count"></span>
            <button class="btn" onclick="exportRequestsCSV()"><i class="ti ti-download"></i>CSV</button>
          </div>
        </div>
        <div id="pending-reqs"></div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">処理済み履歴</span></div>
        <table><thead><tr><th>メンバー</th><th>対象日</th><th>修正内容</th><th>区分</th><th>ステータス</th><th>申請日</th></tr></thead>
        <tbody id="done-reqs"></tbody></table>
      </div>
    </div>

    <!-- 出退勤記録 -->
    <div id="sec-attendance" class="sec">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="attMonthDelta(-1)" style="border:none;background:none;cursor:pointer;font-size:18px;color:var(--purple)">&#8249;</button>
          <span style="font-size:13px;font-weight:500;min-width:80px;text-align:center" id="att-month-label"></span>
          <button onclick="attMonthDelta(1)" style="border:none;background:none;cursor:pointer;font-size:18px;color:var(--purple)">&#8250;</button>
        </div>
        <select id="att-member-sel" onchange="renderAttendanceRecord()" style="font-size:13px;padding:6px 10px;border-radius:8px;border:0.5px solid var(--b2);background:var(--bg1);color:var(--t1)"></select>
        <button class="btn" onclick="exportAttRecordCSV()"><i class="ti ti-download"></i>個人CSV</button>
        <button class="btn" onclick="exportAllAttRecordCSV()"><i class="ti ti-download"></i>全員CSV</button>
      </div>
      <div class="card">
        <div class="card-head">
          <span class="card-title" id="att-record-title">出退勤記録</span>
          <div style="display:flex;gap:12px;font-size:12px;color:var(--t2)">
            <span>合計: <strong id="att-total-h">—</strong></span>
            <span>残業: <strong id="att-total-ot">—</strong></span>
            <span>遅刻: <strong id="att-late-count">—</strong></span>
          </div>
        </div>
        <table id="att-record-table">
          <thead><tr>
            <th style="width:100px">日付</th>
            <th style="width:70px">曜日</th>
            <th style="width:90px">出勤</th>
            <th style="width:90px">退勤</th>
            <th style="width:70px">休憩</th>
            <th style="width:80px">実労働時間</th>
            <th style="width:70px">ステータス</th>
            <th style="width:60px"></th>
          </tr></thead>
          <tbody id="att-record-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- メンバー管理 -->
    <div id="sec-members" class="sec">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <span style="font-size:13px;font-weight:500;color:var(--t1)">登録メンバー（<span id="member-count">0</span>名）</span>
        <button class="btn-primary" onclick="openMemberModal(null)"><i class="ti ti-user-plus"></i> メンバーを追加</button>
      </div>
      <div class="card">
        <table>
          <thead><tr><th style="width:70px">順番</th><th>メンバー</th><th>役割</th><th>タイムゾーン</th><th style="text-align:right">給与</th><th>タイプ</th><th>在籍</th><th></th></tr></thead>
          <tbody id="member-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- パスワード変更モーダル -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal" style="width:360px">
    <h3>管理者パスワード変更<button onclick="closeModal('pw-modal')" style="border:none;background:none;cursor:pointer;font-size:20px;color:var(--t2)">×</button></h3>
    <div class="form-field"><label>現在のパスワード</label><input type="password" id="pw-current" placeholder="現在のパスワード"></div>
    <div class="form-field"><label>新しいパスワード</label><input type="password" id="pw-new" placeholder="新しいパスワード（6文字以上）"></div>
    <div class="form-field"><label>新しいパスワード（確認）</label><input type="password" id="pw-confirm" placeholder="もう一度入力"></div>
    <div style="font-size:12px;color:#c0392b;min-height:18px;margin-bottom:8px" id="pw-err"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button class="btn" onclick="closeModal('pw-modal')">キャンセル</button>
      <button class="btn-primary" onclick="changePw()">変更する</button>
    </div>
  </div>
</div>

<!-- メンバー編集モーダル -->
<div class="modal-overlay" id="member-modal">
  <div class="modal">
    <h3><span id="modal-title">メンバーを追加</span><button onclick="closeModal('member-modal')" style="border:none;background:none;cursor:pointer;font-size:20px;color:var(--t2)">×</button></h3>
    <input type="hidden" id="edit-id">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-field" style="grid-column:1/-1"><label>氏名</label><input type="text" id="edit-name" placeholder="田中 健太"></div>
      <div class="form-field"><label>イニシャル（2文字以内）</label><input type="text" id="edit-initials" maxlength="2" placeholder="田"></div>
      <div class="form-field"><label>役割</label><input type="text" id="edit-role" placeholder="フロントエンド"></div>
      <div class="form-field"><label>タイムゾーン</label><select id="edit-tz">
        <option value="🇯🇵 JST">🇯🇵 JST（日本）</option>
        <option value="🇮🇳 IST">🇮🇳 IST（インド）</option>
        <option value="🇺🇸 PST">🇺🇸 PST（アメリカ西）</option>
        <option value="🇺🇸 EST">🇺🇸 EST（アメリカ東）</option>
        <option value="🇬🇧 GMT">🇬🇧 GMT（イギリス）</option>
        <option value="🇵🇭 PHT">🇵🇭 PHT（フィリピン）</option>
        <option value="🇻🇳 ICT">🇻🇳 ICT（ベトナム）</option>
        <option value="🇮🇩 WIB">🇮🇩 WIB（インドネシア）</option>
        <option value="🇲🇾 MYT">🇲🇾 MYT（マレーシア）</option>
      </select></div>
      <div class="form-field">
        <label>給与タイプ</label>
        <select id="edit-salary-type" onchange="toggleSalaryType()">
          <option value="hourly">時給制</option>
          <option value="monthly">月給制</option>
          <option value="unit">単価制</option>
        </select>
      </div>
      <div id="hourly-field" class="form-field"><label>時給（円）</label><input type="number" id="edit-rate" placeholder="1500"></div>
      <div id="monthly-field" class="form-field" style="display:none"><label>月給（円）</label><input type="number" id="edit-monthly" placeholder="200000"></div>
      <div id="unit-field" class="form-field" style="display:none"><label>単価（円/件）</label><input type="number" id="edit-unit" placeholder="5000"></div>
      <div class="form-field">
        <label>在籍状況</label>
        <select id="edit-status">
          <option value="active">在籍中</option>
          <option value="inactive">退職済み</option>
        </select>
      </div>
    </div>
    <div class="form-field"><label>アバターカラー</label>
      <div class="color-grid" id="color-grid"></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
      <button id="delete-btn" class="btn-danger" onclick="deleteMember()" style="display:none"><i class="ti ti-trash"></i> 削除</button>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn" onclick="closeModal('member-modal')">キャンセル</button>
        <button class="btn-primary" onclick="saveMember()">保存する</button>
      </div>
    </div>
  </div>
</div>

<!-- シフト追加モーダル -->
<div class="modal-overlay" id="shift-modal">
  <div class="modal">
    <h3>シフトを追加<button onclick="closeModal('shift-modal')" style="border:none;background:none;cursor:pointer;font-size:20px;color:var(--t2)">×</button></h3>
    <div class="form-field"><label>メンバー</label><select id="sm-member"></select></div>
    <div class="form-field"><label>日付</label><input type="date" id="sm-date"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-field"><label>出勤予定</label><input type="time" id="sm-in" value="09:00"></div>
      <div class="form-field"><label>退勤予定</label><input type="time" id="sm-out" value="18:00"></div>
    </div>
    <div class="form-field"><label>メモ</label><input type="text" id="sm-note" placeholder="在宅 / 出社 など"></div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
      <button class="btn" onclick="closeModal('shift-modal')">キャンセル</button>
      <button class="btn-primary" onclick="saveAdminShift()">追加する</button>
    </div>
  </div>
</div>

<script>
function toHHMM(h){
  if(!h||h<=0) return '—';
  var totalMin=Math.round(h*60);
  var hh=Math.floor(totalMin/60);
  var mm=totalMin%60;
  return (hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
}
function minsToHHMM(totalMin){
  if(!totalMin||totalMin<=0) return '—';
  var hh=Math.floor(totalMin/60);
  var mm=totalMin%60;
  return (hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
}
// ====== データ管理 ======
const COLORS=[
  {bg:'#EEEDFE',text:'#3C3489'},{bg:'#E1F5EE',text:'#085041'},{bg:'#FAEEDA',text:'#633806'},
  {bg:'#F1EFE8',text:'#444441'},{bg:'#FCE8E8',text:'#7A1F1F'},{bg:'#E8F4FC',text:'#1A4A6B'},
  {bg:'#F0F9E8',text:'#2A5E0A'},{bg:'#FFF3E0',text:'#7A4100'},{bg:'#F3E5F5',text:'#5B0B7A'},
  {bg:'#E3F2FD',text:'#0D47A1'},{bg:'#FFF8E1',text:'#7A5F00'},{bg:'#E8EAF6',text:'#1A237E'},
];
let selColor=COLORS[0];

function getMembers(){try{return JSON.parse(localStorage.getItem('tb_members')||'null');}catch{return null;}}
function defaultMembers(){return[
  {id:1,name:"我那覇",initials:"我",tz:"🇯🇵 JST",role:"スタッフ",color:"#EEEDFE",textColor:"#3C3489",hourlyRate:1500,salaryType:"hourly",monthlySalary:0},

function calcWorkMinutes(clockIn, clockOut, breakMin){
  // HH:MM 形式の検証
  var timeReg=/^\d{2}:\d{2}$/;
  if(!timeReg.test(clockIn)||!timeReg.test(clockOut)) return 0;
  try{
    var dummy='2000-01-01T';
    var mins=Math.round((new Date(dummy+clockOut)-new Date(dummy+clockIn))/60000)-( breakMin||0);
    return Math.max(0,mins);
  }catch(e){ return 0; }
}

function getSummary(mid){
  // tb_daily_（退勤済み日次データ）
  var dailyData={};
  try{ dailyData=JSON.parse(localStorage.getItem('tb_daily_'+mid)||'{}'); }catch{}
  // 管理者編集データ
  var editData={};
  try{ editData=JSON.parse(localStorage.getItem('tb_att_edit_'+mid)||'{}'); }catch{}
  // 今日のリアルタイム打刻
  var clkData={};
  try{ clkData=JSON.parse(localStorage.getItem('tb_clk_'+mid)||'{}'); }catch{}

  var totalMin=0, late=0, days=0;
  var today=new Date().toISOString().slice(0,10);

  // 全日付を収集
  var allDates={};
  Object.keys(dailyData).forEach(function(d){ allDates[d]=1; });
  Object.keys(editData).forEach(function(d){ allDates[d]=1; });
  if(clkData.clockInTime) allDates[today]=1;

  Object.keys(allDates).forEach(function(date){
    var clockIn='', clockOut='', breakMin=0;
    var ed=editData[date];
    var dd=dailyData[date];
    if(ed){
      clockIn=ed.clockIn||''; clockOut=ed.clockOut||''; breakMin=ed.breakMin||0;
    } else if(date===today && clkData.clockInTime){
      clockIn=new Date(clkData.clockInTime).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false});
      if(clkData.clockOutTime) clockOut=new Date(clkData.clockOutTime).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false});
      breakMin=clkData.totalBreakMin||0;
    } else if(dd){
      clockIn=dd.clockIn||''; clockOut=dd.clockOut||''; breakMin=dd.breakMin||0;
    }
    // — を空文字に変換
    if(clockIn==='—') clockIn='';
    if(clockOut==='—') clockOut='';
    var mins=calcWorkMinutes(clockIn, clockOut, breakMin);
    if(mins>0){
      totalMin+=mins; days++;
      if(clockIn>'09:30') late++;
    }
  });
  return{
    totalMin:totalMin,
    total:Math.round(totalMin/60*10)/10,
    ot:0, late:late, days:days
  };
}

  var keysToDelete=[];
  for(var i=0;i<localStorage.length;i++){

      key.startsWith('tb_clk_') ||
      key.startsWith('tb_daily_') ||

      key.startsWith('tb_reqs_') ||
      key.startsWith('tb_att_edit_') ||
      key.startsWith('tb_admin_shifts')

}
function moveMember(id, dir){
  const MEMBERS=loadMembers();
  const idx=MEMBERS.findIndex(m=>m.id===id);
  if(idx===-1) return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=MEMBERS.length) return;
  const tmp=MEMBERS[idx];
  MEMBERS[idx]=MEMBERS[newIdx];
  MEMBERS[newIdx]=tmp;
  saveMembers(MEMBERS);
  renderMemberTable();
}

  const summaries=MEMBERS.map(m=>({m,s:getSummary(m.id)}));
  const totalH=summaries.reduce((a,x)=>a+x.s.total,0);
  const totalOT=summaries.reduce((a,x)=>a+x.s.ot,0);
  const pending=getAllPendingReqs().length;
  document.getElementById('report-metrics').innerHTML=`
    <div class="mc"><div class="mc-label">総勤務時間</div><div class="mc-val">${Math.round(totalH)}h</div><div class="mc-sub" style="color:#3B6D11">前月比+2.3%</div></div>
    <div class="mc"><div class="mc-label">平均/人</div><div class="mc-val">${Math.round(totalH/MEMBERS.length)}h</div><div class="mc-sub">目標160h</div></div>
    <div class="mc"><div class="mc-label">残業合計</div><div class="mc-val">${Math.round(totalOT)}h</div><div class="mc-sub" style="color:#854F0B">前月比+12%</div></div>
    <div class="mc"><div class="mc-label">未処理リクエスト</div><div class="mc-val">${pending}件</div><div class="mc-sub" style="color:${pending>0?'#791F1F':'var(--t3)'}">  ${pending>0?'要対応':'なし'}</div></div>`;
  document.getElementById('attendance-tbody').innerHTML=summaries.map(({m,s})=>{
    const pct=Math.round(s.total/160*100);
    const col=pct<75?'#E24B4A':'#534AB7';
    return`<tr><td><div style="display:flex;align-items:center;gap:8px">${avEl(m)}<div><div style="font-size:12px;font-weight:500">${m.name}</div><div style="font-size:10px;color:var(--t3)">${m.tz}</div></div></div></td>
    <td>${minsToHHMM(s.totalMin)}</td>
    <td><div style="display:flex;align-items:center;gap:6px"><div class="prog-bg"><div class="prog-fill" style="width:${Math.min(pct,100)}%;background:${col}"></div></div><span style="font-size:11px;color:${pct<75?'#791F1F':'var(--t2)'}">${pct}%</span></div></td>
    <td><span class="badge ${s.late>=3?'badge-danger':s.late>0?'badge-warn':'badge-ok'}">${s.late}回</span></td>
    <td><span class="badge ${pct>=90?'badge-ok':pct>=75?'badge-warn':'badge-danger'}">${pct>=90?'良好':pct>=75?'要確認':'警告'}</span></td></tr>`;

  document.getElementById('report-ai').textContent=warn.length>0?warn.map(x=>x.m.name).join('、')+'の残業が多い傾向です。':'今月の勤務状況は概ね良好です。';
}

function renderPayroll(){
  const MEMBERS=loadMembers().filter(m=>(m.status||'active')==='active');
  let grand=0,totalOT=0;
  const rows=MEMBERS.map(m=>{
    const s=getSummary(m.id);
    let tot=0;
    if(m.salaryType==='monthly'){
      tot=m.monthlySalary||0;
    }else if(m.salaryType==='unit'){
      tot=Math.round(s.days*(m.unitPrice||0));
    }else{
      // 分単位で正確に計算（totalMin/60 × 時給）
      tot=Math.round((s.totalMin/60)*(m.hourlyRate||0));
    }
    grand+=tot;
    return{m,s,tot};
  });
  document.getElementById('payroll-metrics').innerHTML=`
    <div class="mc"><div class="mc-label">総人件費（今月）</div><div class="mc-val">¥${grand.toLocaleString()}</div></div>
    <div class="mc"><div class="mc-label">メンバー数</div><div class="mc-val">${MEMBERS.length}名</div></div>
    <div class="mc"><div class="mc-label">勤務合計（全員）</div><div class="mc-val">${minsToHHMM(MEMBERS.reduce((s,m)=>s+getSummary(m.id).totalMin,0))}</div></div>`;
  document.getElementById('payroll-tbody').innerHTML=rows.map(({m,s,reg,rp,op,tot})=>`
    <tr><td><div style="display:flex;align-items:center;gap:8px">${avEl(m)}<div><div style="font-size:12px;font-weight:500">${m.name}</div><div style="font-size:10px;color:var(--t3)">${m.role}</div></div></div></td>
    <td style="text-align:right">${m.salaryType==='monthly'?'¥'+(m.monthlySalary||0).toLocaleString()+'/月':m.salaryType==='unit'?'¥'+(m.unitPrice||0).toLocaleString()+'/件':'¥'+(m.hourlyRate||0).toLocaleString()+'/h'}</td>
    <td style="text-align:right">${minsToHHMM(s.totalMin)}</td>
    <td style="text-align:right;font-weight:500">¥${tot.toLocaleString()}</td></tr>`).join('');
  document.getElementById('grand-total').textContent='¥'+grand.toLocaleString();
  document.getElementById('hourly-grid').innerHTML=MEMBERS.map(m=>`
    <div style="background:var(--bg2);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px">
      ${avEl(m,28)}
      <div style="flex:1">
        <div style="font-size:12px;font-weight:500">${m.name}</div>
        <div style="font-size:10px;color:var(--t3);margin-bottom:3px">${m.salaryType==='monthly'?'月給制':m.salaryType==='unit'?'単価制':'時給制'}</div>
        ${m.salaryType==='monthly'
          ?`<input type="number" value="${m.monthlySalary||0}" onchange="updateRate(${m.id},this.value,'monthly')" style="font-size:12px;border:0.5px solid var(--b2);border-radius:6px;padding:3px 6px;width:90px"> <span style="font-size:11px;color:var(--t3)">円/月</span>`

          ?`<input type="number" value="${m.unitPrice||0}" onchange="updateRate(${m.id},this.value,'unit')" style="font-size:12px;border:0.5px solid var(--b2);border-radius:6px;padding:3px 6px;width:80px"> <span style="font-size:11px;color:var(--t3)">円/件</span>`

function updateRate(id,val,type){
  const MEMBERS=loadMembers();
  const m=MEMBERS.find(x=>x.id===id);
  if(m){
    if(type==='monthly') m.monthlySalary=parseInt(val)||0;
    else if(type==='unit') m.unitPrice=parseInt(val)||0;
    else m.hourlyRate=parseInt(val)||0;
    saveMembers(MEMBERS);renderPayroll();
  }
}

// ====== シフト管理 ======
function getAllShifts(){
  const MEMBERS=loadMembers();
  const memberShifts=MEMBERS.flatMap(m=>getShiftsFor(m.id).map(s=>({...s,memberName:m.name,memberObj:m})));
  const adminShifts=getAdminShifts().map(s=>{const m=MEMBERS.find(x=>x.id===s.memberId);return{...s,memberName:m?m.name:'?',memberObj:m||{}};});
  return[...memberShifts,...adminShifts].sort((a,b)=>a.date>b.date?1:-1);
}
let adminShiftMonth=new Date();adminShiftMonth.setDate(1);
let adminShiftMember=0;

function renderShifts(){
  const MEMBERS=loadMembers().filter(m=>(m.status||'active')==='active');
  renderTodayShifts();
  const all=getAllShifts();
  // バッジ（承認待ちは廃止、常に0）
  document.getElementById('shift-pending-count').textContent='';
  document.getElementById('shift-pending-count').style.display='none';
  document.getElementById('shift-badge').style.display='none';

  const y=adminShiftMonth.getFullYear(),m=adminShiftMonth.getMonth();
  const memberSel=adminShiftMember||MEMBERS[0]?.id;

  // メンバー選択タブ
  let memberTabs='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
  MEMBERS.forEach(mem=>{
    const active=mem.id===memberSel;
    memberTabs+=`<button onclick="setAdminShiftMember(${mem.id})" style="font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid ${active?'#534AB7':'var(--b2)'};background:${active?'#534AB7':'transparent'};color:${active?'#fff':'var(--t2)'};cursor:pointer">${mem.name}</button>`;
  });
  memberTabs+='</div>';

  // 月ナビ
  const monthNav=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button onclick="adminShiftMonthDelta(-1)" style="border:none;background:none;cursor:pointer;font-size:20px;color:var(--purple)">&#8249;</button>
    <span style="font-size:13px;font-weight:500">${y}年${m+1}月</span>
    <button onclick="adminShiftMonthDelta(1)" style="border:none;background:none;cursor:pointer;font-size:20px;color:var(--purple)">&#8250;</button>
  </div>`;

  // カレンダー
  const memberShifts=all.filter(s=>s.memberId===memberSel||s.memberObj?.id===memberSel);
  const daysInMonth=new Date(y,m+1,0).getDate();
  const firstDay=new Date(y,m,1).getDay();
  const dowLabels=['日','月','火','水','木','金','土'];
  let cal='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">';
  dowLabels.forEach(d=>{cal+=`<div style="text-align:center;font-size:10px;color:var(--t3);padding:2px">${d}</div>`;});
  cal+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
  for(let i=0;i<firstDay;i++)cal+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const date=y+'-'+(m+1<10?'0':'')+(m+1)+'-'+(d<10?'0':'')+d;
    const dow=new Date(y,m,d).getDay();
    const weekend=dow===0||dow===6;
    const shift=memberShifts.find(s=>s.date===date);
    const today=new Date().toISOString().slice(0,10)===date;
    cal+=`<div style="text-align:center;padding:4px 2px;border-radius:6px;background:${shift?'#EEEDFE':weekend?'transparent':'var(--bg2)'};border:${today?'1.5px solid #534AB7':'1.5px solid transparent'};opacity:${weekend?0.4:1}">
      <div style="font-size:11px;font-weight:${today?600:400};color:${shift?'#3C3489':'var(--t1)'}">${d}</div>
      ${shift?`<div style="font-size:9px;color:#534AB7;line-height:1.3">${shift.startTime}<br>${shift.endTime}</div>`:''}
    </div>`;
  }
  cal+='</div>';

  document.getElementById('pending-shifts').innerHTML=memberTabs+monthNav+cal;
  document.getElementById('approved-shifts').innerHTML='';
}

function setAdminShiftMember(id){adminShiftMember=id;renderShifts();}
function adminShiftMonthDelta(d){adminShiftMonth.setMonth(adminShiftMonth.getMonth()+d);renderShifts();}

function renderTodayShifts(){
  const MEMBERS=loadMembers().filter(m=>(m.status||'active')==='active');
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('today-shift-date').textContent=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

  // 各メンバーのシフトと打刻状況を収集
  const rows=[];
  MEMBERS.forEach(function(m){
    const shifts=[...getShiftsFor(m.id),...getAdminShifts().filter(s=>s.memberId===m.id)];
    const shift=shifts.find(s=>s.date===today);
    // 打刻データ
    let clkData={};
    try{clkData=JSON.parse(localStorage.getItem('tb_clk_'+m.id)||'{}');}catch{}
    const hasClock=clkData.clockInTime;
    if(shift||hasClock){
      rows.push({m,shift,clkData,hasClock});
    }
  });

  if(rows.length===0){
    document.getElementById('today-shift-list').innerHTML='<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">本日のシフト登録者はいません</div>';
    return;
  }

  document.getElementById('today-shift-list').innerHTML=rows.map(function(r){
    const m=r.m;
    const shift=r.shift;
    const clk=r.clkData;
    const clockIn=clk.clockInTime?new Date(clk.clockInTime).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false}):'—';
    const clockOut=clk.clockOutTime?new Date(clk.clockOutTime).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false}):'—';
    const isWorking=clk.clocked&&!clk.clockOutTime;
    const isDone=clk.clockOutTime;
    let statusBadge='';
    if(isDone) statusBadge='<span class="badge badge-gray">退勤済み</span>';
    else if(isWorking) statusBadge='<span class="badge badge-ok">● 勤務中</span>';
    else if(shift) statusBadge='<span class="badge badge-purple">未打刻</span>';

    return '<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:0.5px solid var(--b1)">'
      +avEl(m,28)
      +'<div style="flex:1"><div style="font-size:13px;font-weight:500">'+m.name+'</div>'
      +(shift?'<div style="font-size:11px;color:var(--t3)">シフト: '+shift.startTime+'〜'+shift.endTime+(shift.note?' ('+shift.note+')':'')+'</div>':'')
      +'</div>'
      +'<div style="text-align:right">'
      +statusBadge
      +(r.hasClock?'<div style="font-size:11px;color:var(--t2);margin-top:3px">打刻: '+clockIn+' 〜 '+clockOut+'</div>':'')
      +'</div>'
      +'</div>';
  }).join('');
}
function approveShift(id,mid){
  if(mid){const list=getShiftsFor(mid);const s=list.find(x=>String(x.id)===String(id));if(s){s.status='approved';localStorage.setItem('tb_shifts_'+mid,JSON.stringify(list));}}
  else{const list=getAdminShifts();const s=list.find(x=>String(x.id)===String(id));if(s){s.status='approved';saveAdminShifts(list);}}
  renderShifts();
}
function rejectShift(id,mid){
  if(mid){const list=getShiftsFor(mid);const s=list.find(x=>String(x.id)===String(id));if(s){s.status='rejected';localStorage.setItem('tb_shifts_'+mid,JSON.stringify(list));}}
  else{const list=getAdminShifts();const s=list.find(x=>String(x.id)===String(id));if(s){s.status='rejected';saveAdminShifts(list);}}
  renderShifts();
}

// ====== 修正リクエスト ======
function getAllReqsFromStorage(){
  const MEMBERS=loadMembers();
  const memberMap={};
  MEMBERS.forEach(m=>{ memberMap[String(m.id)]={name:m.name,obj:m}; });
  var allReqs=[];
  try{
    // まず全メンバーIDで直接取得
    MEMBERS.forEach(function(m){
      var reqs=[];
      try{ reqs=JSON.parse(localStorage.getItem('tb_reqs_'+m.id)||'[]'); }catch{}
      reqs.forEach(function(r){
        allReqs.push(Object.assign({},r,{memberName:m.name,memberObj:m}));
      });
    });
    // さらに全キースキャンで漏れをキャッチ
    var found=new Set(allReqs.map(function(r){return String(r.id);}));
    for(var i=0;i<localStorage.length;i++){
      var key=localStorage.key(i);
      if(key && key.startsWith('tb_reqs_')){
        var mid=key.replace('tb_reqs_','');
        if(!memberMap[mid]){
          var reqs2=[];
          try{ reqs2=JSON.parse(localStorage.getItem(key)||'[]'); }catch{}
          reqs2.forEach(function(r){
            if(!found.has(String(r.id))){
              var mInfo={name:'メンバー'+mid,obj:{id:mid,name:'メンバー'+mid,initials:'?',color:'#EEEDFE',textColor:'#3C3489'}};
              allReqs.push(Object.assign({},r,{memberName:mInfo.name,memberObj:mInfo.obj}));
              found.add(String(r.id));
            }
          });
        }
      }
    }
  }catch(e){ console.error('getAllReqs error:', e); }
  return allReqs;
}
function getAllPendingReqs(){
  return getAllReqsFromStorage().filter(r=>r.status==='pending');
}
function getAllDoneReqs(){
  return getAllReqsFromStorage().filter(r=>r.status!=='pending');
}
function renderRequests(){
  const pending=getAllPendingReqs();
  const done=getAllDoneReqs();
  const pc=pending.length;
  document.getElementById('req-pending-count').textContent=pc+'件 要対応';
  document.getElementById('req-pending-count').style.display=pc>0?'':'none';
  document.getElementById('req-badge').textContent=pc;
  document.getElementById('req-badge').style.display=pc>0?'':'none';
  document.getElementById('pending-reqs').innerHTML=pc===0

function approveReq(mid,id){updateReq(mid,id,'approved');}
function rejectReq(mid,id){updateReq(mid,id,'rejected');}
function updateReq(mid,id,status){
  // mid を String にして確実に同じキーで読み書き
  var sMid=String(mid);
  var list=[];
  try{ list=JSON.parse(localStorage.getItem('tb_reqs_'+sMid)||'[]'); }catch{}
  var r=list.find(function(x){ return String(x.id)===String(id); });
  if(r){
    r.status=status;
    localStorage.setItem('tb_reqs_'+sMid, JSON.stringify(list));
  }
  renderRequests();renderReport();
}

function saveMember(){

  const id=document.getElementById('edit-id').value;
  const stype=document.getElementById('edit-salary-type').value;

  const monthly=parseInt(document.getElementById('edit-monthly').value)||0;
  const unit=parseInt(document.getElementById('edit-unit').value)||0;

  if(id){

}

// ====== CSV エクスポート ======
function exportCSV(filename,header,rows){
  const csv=[header,...rows].map(r=>r.join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}
function exportAttendanceCSV(){
  const now=new Date();
  const label=now.getFullYear()+'年'+(now.getMonth()+1)+'月';
  const MEMBERS=loadMembers();
  const header=['名前','役割','タイムゾーン','給与タイプ','勤務時間(h)','残業(h)','遅刻回数','達成率(%)','通常給与(円)','残業給与(円)','合計支給額(円)'];
  const rows=MEMBERS.map(m=>{
    const s=getSummary(m.id);
    const reg=Math.max(0,s.total-s.ot);
    let rp,op;
    if(m.salaryType==='monthly'){rp=m.monthlySalary||0;op=Math.round(s.ot*((m.monthlySalary||0)/160)*1.25);}
    else{rp=Math.round(reg*(m.hourlyRate||0));op=Math.round(s.ot*(m.hourlyRate||0)*1.25);}
    return[m.name,m.role,m.tz,m.salaryType==='monthly'?'月給制':'時給制',s.total,s.ot,s.late,Math.round(s.total/160*100),rp,op,rp+op];
  });
  exportCSV('全員勤怠レポート_'+label+'.csv',header,rows);
}
function exportPayrollCSV(){
  exportCSV('給与計算.csv',['名前','時給','通常(h)','通常給与','残業(h)','残業給与','合計'],
    loadMembers().map(m=>{const s=getSummary(m.id);const reg=Math.max(0,s.total-s.ot);return[m.name,m.hourlyRate,reg,Math.round(reg*m.hourlyRate),s.ot,Math.round(s.ot*m.hourlyRate*1.25),Math.round(reg*m.hourlyRate)+Math.round(s.ot*m.hourlyRate*1.25)];}));
}
function exportRequestsCSV(){
  const all=[...getAllPendingReqs(),...getAllDoneReqs()];
  exportCSV('修正リクエスト.csv',['メンバー','対象日','修正前出勤','修正前退勤','修正後出勤','修正後退勤','区分','ステータス'],
    all.map(r=>[r.memberName,r.date,r.oldIn,r.oldOut,r.newIn,r.newOut,r.category,r.status]));
}

function renderAttendanceRecord(){
  var MEMBERS=loadMembers();
  var sel=document.getElementById('att-member-sel');
  if(!sel) return;
  var mid=parseInt(sel.value);
  var mem=MEMBERS.find(function(m){return m.id===mid;});
  if(!mem) return;

  var y=attMonth.getFullYear(), m=attMonth.getMonth();
  document.getElementById('att-month-label').textContent=y+'年'+(m+1)+'月';
  document.getElementById('att-record-title').textContent=mem.name+' の出退勤記録';

  var daysInMonth=new Date(y,m+1,0).getDate();
  var dowNames=['日','月','火','水','木','金','土'];

  // 打刻データ取得（tb_daily_ から全日付分）
  var clkData={};
  try{ clkData=JSON.parse(localStorage.getItem('tb_clk_'+mid)||'{}'); }catch{}
  var dailyData={};
  try{ dailyData=JSON.parse(localStorage.getItem('tb_daily_'+mid)||'{}'); }catch{}

  var totalMin=0, lateCount=0;
  var rows='';

  for(var d=1;d<=daysInMonth;d++){
    var mm=m+1;
    var date=y+'-'+(mm<10?'0':'')+mm+'-'+(d<10?'0':'')+d;
    var dow=new Date(y,m,d).getDay();
    var weekend=(dow===0||dow===6);
    var isToday=new Date().toISOString().slice(0,10)===date;
    var isFuture=date>new Date().toISOString().slice(0,10);
    var dowName=dowNames[dow];

    if(weekend){
      rows+='<tr style="opacity:0.4"><td style="padding:8px 12px;font-size:12px">'+date+'</td><td style="padding:8px 12px;font-size:12px;color:var(--t3)">'+dowName+'</td><td colspan="6" style="padding:8px 12px;font-size:11px;color:var(--t3);text-align:center">休日</td></tr>';
      continue;
    }
    if(isFuture){
      rows+='<tr style="opacity:0.4"><td style="padding:8px 12px;font-size:12px">'+date+'</td><td style="padding:8px 12px;font-size:12px">'+dowName+'</td><td colspan="6" style="padding:8px 12px;font-size:11px;color:var(--t3);text-align:center">—</td></tr>';
      continue;
    }

    var clockIn='—', clockOut='—', breakMin=0, workMin=0;
    var late=false;

    // 管理者による編集データを優先
    var editData=getAttendanceEdit(mid, date);
    if(editData){
      clockIn=editData.clockIn||'—';
      clockOut=editData.clockOut||'—';
      breakMin=editData.breakMin||0;
      workMin=calcWorkMinutes(clockIn==='—'?'':clockIn, clockOut==='—'?'':clockOut, breakMin);
      late=clockIn>'09:30'&&clockIn!=='—';
    } else if(dailyData[date]){
      var dd=dailyData[date];
      clockIn=dd.clockIn||'—';
      clockOut=dd.clockOut||'—';
      breakMin=dd.breakMin||0;
      workMin=calcWorkMinutes(clockIn==='—'?'':clockIn, clockOut==='—'?'':clockOut, breakMin);
      late=clockIn>'09:30'&&clockIn!=='—';
    } else if(isToday && clkData.clockInTime){
      clockIn=new Date(clkData.clockInTime).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false});
      if(clkData.clockOutTime){
        clockOut=new Date(clkData.clockOutTime).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false});
        workMin=calcWorkMinutes(clockIn, clockOut, clkData.totalBreakMin||0);
      }
      late=clockIn>'09:30';
    }
    if(workMin>0){ totalMin+=workMin; }
    if(late) lateCount++;

    var statusBadge='';
    if(workMin===0 && !isFuture && !isToday) statusBadge='<span class="badge badge-danger">欠勤</span>';
    else if(late) statusBadge='<span class="badge badge-warn">遅刻</span>';
    else if(workMin>0) statusBadge='<span class="badge badge-ok">出勤</span>';
    if(isToday && clkData.clocked && !clkData.clockOutTime) statusBadge='<span class="badge badge-ok">勤務中</span>';

    rows+='<tr style="'+(isToday?'background:#EEEDFE20':'')+'">'+
      '<td style="padding:8px 12px;font-size:12px;font-weight:'+(isToday?600:400)+'">'+date+'</td>'+
      '<td style="padding:8px 12px;font-size:12px;color:var(--t2)">'+dowName+'</td>'+
      '<td style="padding:8px 12px;font-size:12px">'+clockIn+'</td>'+
      '<td style="padding:8px 12px;font-size:12px">'+clockOut+'</td>'+
      '<td style="padding:8px 12px;font-size:12px;color:var(--t3)">'+breakMin+'分</td>'+
      '<td style="padding:8px 12px;font-size:12px;font-weight:500">'+minsToHHMM(workMin)+'</td>'+
      '<td style="padding:8px 12px">'+statusBadge+'</td>'+
      '<td style="padding:8px 12px"><button class="att-edit-btn" data-mid="'+mid+'" data-date="'+date+'" data-in="'+clockIn+'" data-out="'+clockOut+'" data-break="'+breakMin+'" style="font-size:11px;padding:3px 8px;border-radius:6px;border:0.5px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer">編集</button></td>'+
      '</tr>';
  }

  document.getElementById('att-record-tbody').innerHTML=rows;
  document.getElementById('att-total-h').textContent=minsToHHMM(totalMin);
  document.getElementById('att-late-count').textContent=lateCount+'回';
  // 編集ボタンのイベントリスナー
  document.querySelectorAll('.att-edit-btn').forEach(function(btn){
    btn.onclick=function(){
      openAttEditModal(
        btn.getAttribute('data-mid'),
        btn.getAttribute('data-date'),
        btn.getAttribute('data-in'),
        btn.getAttribute('data-out'),
        parseInt(btn.getAttribute('data-break'))||60
      );
    };
  });
}

function openAttEditModal(mid, date, clockIn, clockOut, breakMin){
  var old=document.getElementById('att-edit-modal');
  if(old) old.remove();

  var overlay=document.createElement('div');
  overlay.id='att-edit-modal';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px';

  var box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:12px;padding:24px;width:100%;max-width:360px';

  var titleRow=document.createElement('div');
  titleRow.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:16px';
  var title=document.createElement('span');
  title.style.cssText='font-size:15px;font-weight:500';
  title.textContent=date+' の勤怠を修正';
  var closeBtn=document.createElement('button');
  closeBtn.style.cssText='border:none;background:none;cursor:pointer;font-size:22px;color:#999';
  closeBtn.textContent='×';
  closeBtn.onclick=function(){ overlay.remove(); };
  titleRow.appendChild(title); titleRow.appendChild(closeBtn);

  var grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px';

  function makeField(labelText, inputType, inputId, val){
    var div=document.createElement('div');
    var lbl=document.createElement('label');
    lbl.style.cssText='font-size:12px;color:#555;display:block;margin-bottom:4px';
    lbl.textContent=labelText;
    var inp=document.createElement('input');
    inp.type=inputType; inp.id=inputId;
    inp.value=val||'';
    inp.style.cssText='width:100%;font-size:13px;border-radius:8px;border:1px solid #ddd;padding:7px 10px';
    div.appendChild(lbl); div.appendChild(inp);
    return div;
  }

  var inField=makeField('出勤時刻','time','aem-in', clockIn==='—'?'':clockIn);
  var outField=makeField('退勤時刻','time','aem-out', clockOut==='—'?'':clockOut);
  grid.appendChild(inField); grid.appendChild(outField);

  var breakDiv=document.createElement('div');
  breakDiv.style.cssText='margin-bottom:16px';
  var brkLabel=document.createElement('label');
  brkLabel.style.cssText='font-size:12px;color:#555;display:block;margin-bottom:4px';
  brkLabel.textContent='休憩時間（分）';
  var brkInput=document.createElement('input');
  brkInput.type='number'; brkInput.id='aem-break';
  brkInput.value=breakMin||60;
  brkInput.style.cssText='width:100%;font-size:13px;border-radius:8px;border:1px solid #ddd;padding:7px 10px';
  breakDiv.appendChild(brkLabel); breakDiv.appendChild(brkInput);

  var noteDiv=document.createElement('div');
  noteDiv.style.cssText='margin-bottom:20px';
  var noteLbl=document.createElement('label');
  noteLbl.style.cssText='font-size:12px;color:#555;display:block;margin-bottom:4px';
  noteLbl.textContent='修正理由（任意）';
  var noteInp=document.createElement('input');
  noteInp.type='text'; noteInp.id='aem-note';
  noteInp.placeholder='打刻ミス・システム障害など';
  noteInp.style.cssText='width:100%;font-size:13px;border-radius:8px;border:1px solid #ddd;padding:7px 10px';
  noteDiv.appendChild(noteLbl); noteDiv.appendChild(noteInp);

  var btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;justify-content:flex-end;gap:8px';
  var cancelBtn=document.createElement('button');
  cancelBtn.style.cssText='font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:transparent;color:#555;cursor:pointer';
  cancelBtn.textContent='キャンセル';
  cancelBtn.onclick=function(){ overlay.remove(); };
  var saveBtn=document.createElement('button');
  saveBtn.style.cssText='font-size:13px;padding:8px 18px;border-radius:8px;border:none;background:#534AB7;color:#fff;cursor:pointer;font-weight:500';
  saveBtn.textContent='保存する';
  saveBtn.onclick=function(){
    var si=document.getElementById('aem-in').value;
    var so=document.getElementById('aem-out').value;
    var brk=parseInt(document.getElementById('aem-break').value)||60;
    var note=document.getElementById('aem-note').value;
    saveAttendanceEdit(mid, date, si, so, brk, note);
    overlay.remove();
    renderAttendanceRecord();
  };
  btnRow.appendChild(cancelBtn); btnRow.appendChild(saveBtn);

  box.appendChild(titleRow); box.appendChild(grid);
  box.appendChild(breakDiv); box.appendChild(noteDiv); box.appendChild(btnRow);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

function saveAttendanceEdit(mid, date, clockIn, clockOut, breakMin, note){
  var key='tb_att_edit_'+mid;
  var edits={};
  try{ edits=JSON.parse(localStorage.getItem(key)||'{}'); }catch{}
  edits[date]={clockIn:clockIn, clockOut:clockOut, breakMin:breakMin, note:note, editedAt:new Date().toLocaleString('ja-JP')};
  localStorage.setItem(key, JSON.stringify(edits));
}

function getAttendanceEdit(mid, date){
  try{
    var edits=JSON.parse(localStorage.getItem('tb_att_edit_'+mid)||'{}');
    return edits[date]||null;
  }catch{ return null; }
}

function exportAllAttRecordCSV(){
  var MEMBERS=loadMembers();
  var y=attMonth.getFullYear(), m=attMonth.getMonth();
  var label=y+'年'+(m+1)+'月';
  var daysInMonth=new Date(y,m+1,0).getDate();
  var dowNames=['日','月','火','水','木','金','土'];
  var header=['メンバー','在籍状況','日付','曜日','出勤','退勤','休憩(分)','実労働時間','ステータス'];
  var rows=[];

  MEMBERS.forEach(function(mem){
    var dailyData={};
    try{ dailyData=JSON.parse(localStorage.getItem('tb_daily_'+mem.id)||'{}'); }catch{}
    var editData={};
    try{ editData=JSON.parse(localStorage.getItem('tb_att_edit_'+mem.id)||'{}'); }catch{}
    var clkData={};
    try{ clkData=JSON.parse(localStorage.getItem('tb_clk_'+mem.id)||'{}'); }catch{}
    var today=new Date().toISOString().slice(0,10);
    var statusLabel=(mem.status||'active')==='active'?'在籍中':'退職済み';

    for(var d=1;d<=daysInMonth;d++){
      var mm=m+1;
      var date=y+'-'+(mm<10?'0':'')+mm+'-'+(d<10?'0':'')+d;
      var dow=new Date(y,m,d).getDay();
      var dowName=dowNames[dow];
      var clockIn='—', clockOut='—', breakMin=0, workMin=0, st='';
      var ed=editData[date], dd=dailyData[date];
      if(ed){ clockIn=ed.clockIn||'—'; clockOut=ed.clockOut||'—'; breakMin=ed.breakMin||0; }
      else if(date===today && clkData.clockInTime){
        clockIn=new Date(clkData.clockInTime).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false});
        if(clkData.clockOutTime) clockOut=new Date(clkData.clockOutTime).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false});
        breakMin=clkData.totalBreakMin||0;
      } else if(dd){ clockIn=dd.clockIn||'—'; clockOut=dd.clockOut||'—'; breakMin=dd.breakMin||0; }
      if(clockIn!=='—' && clockOut!=='—'){
        workMin=calcWorkMinutes(clockIn,clockOut,breakMin);
        st=clockIn>'09:30'?'遅刻':'出勤';
      } else if(clockIn!=='—'){ st='退勤未打刻'; }
      var workStr=workMin>0?Math.floor(workMin/60)+':'+(workMin%60<10?'0':'')+workMin%60:'—';
      rows.push([mem.name,statusLabel,date,dowName,clockIn,clockOut,breakMin,workStr,st]);
    }
  });
  exportCSV('全員出退勤記録_'+label+'.csv', header, rows);
}

function exportAttRecordCSV(){
  var MEMBERS=loadMembers();
  var sel=document.getElementById('att-member-sel');
  var mid=parseInt(sel.value);
  var mem=MEMBERS.find(function(m){return m.id===mid;});
  if(!mem) return;
  var rows=[['日付','曜日','出勤','退勤','休憩(分)','実労働時間','残業','ステータス']];
  document.getElementById('att-record-tbody').querySelectorAll('tr').forEach(function(tr){
    var tds=tr.querySelectorAll('td');
    if(!tds.length) return;
    rows.push(Array.from(tds).map(function(td){return td.textContent.trim();}));
  });
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=mem.name+'_出退勤記録_'+attMonth.getFullYear()+'年'+(attMonth.getMonth()+1)+'月.csv';
  a.click();
}
function openPwModal(){
  document.getElementById('pw-current').value='';
  document.getElementById('pw-new').value='';
  document.getElementById('pw-confirm').value='';
  document.getElementById('pw-err').textContent='';
  document.getElementById('pw-modal').classList.add('open');
}
function changePw(){
  const cur=document.getElementById('pw-current').value;
  const nw=document.getElementById('pw-new').value;
  const cf=document.getElementById('pw-confirm').value;
  const err=document.getElementById('pw-err');
  const saved=localStorage.getItem('tb_admin_pw')||'admin1234';
  if(cur!==saved){err.textContent='現在のパスワードが違います';return;}
  if(nw.length<6){err.textContent='新しいパスワードは6文字以上にしてください';return;}
  if(nw!==cf){err.textContent='パスワードが一致しません';return;}
  localStorage.setItem('tb_admin_pw',nw);
  closeModal('pw-modal');
  alert('パスワードを変更しました！');
}
