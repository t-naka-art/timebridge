<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeBridge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:40px;width:360px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.logo{font-size:22px;font-weight:600;color:#534AB7;margin-bottom:6px}
.sub{font-size:13px;color:#999;margin-bottom:28px}
.btn-role{display:block;width:100%;padding:14px;border-radius:10px;border:none;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:12px}
.btn-admin{background:#534AB7;color:#fff}.btn-admin:hover{opacity:0.88}
.btn-member{background:#EEEDFE;color:#3C3489}.btn-member:hover{opacity:0.8}
.note{font-size:11px;color:#bbb;margin-top:16px}
/* パスワード画面 */
#pw-screen{display:none}
.pw-title{font-size:15px;font-weight:500;color:#111;margin-bottom:6px}
.pw-sub{font-size:12px;color:#999;margin-bottom:20px}
input[type=password]{width:100%;font-size:14px;padding:10px 12px;border-radius:10px;border:1px solid #ddd;margin-bottom:8px;font-family:inherit;outline:none}
input[type=password]:focus{border-color:#534AB7}
.btn-enter{width:100%;padding:12px;border-radius:10px;border:none;background:#534AB7;color:#fff;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:12px}
.btn-enter:hover{background:#3C3489}
.btn-back{width:100%;padding:10px;border-radius:10px;border:0.5px solid #ccc;background:transparent;color:#555;font-size:13px;cursor:pointer}
.err{font-size:12px;color:#c0392b;margin-bottom:8px;min-height:18px}
.shake{animation:shake 0.3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</head>
<body>
<div class="card">
  <!-- ロール選択 -->
  <div id="role-screen">
    <div class="logo">⏱ TimeBridge</div>
    <div class="sub">在宅・オフショア勤怠管理</div>
    <button class="btn-role btn-admin" onclick="goAdmin()">🔐 管理者としてログイン</button>
    <button class="btn-role btn-member" onclick="location.href='member.html'">👤 メンバーとして打刻する</button>
    <div class="note">管理者ログインにはパスワードが必要です</div>
  </div>

  <!-- パスワード入力 -->
  <div id="pw-screen">
    <div class="logo" style="margin-bottom:4px">🔐</div>
    <div class="pw-title">管理者パスワード</div>
    <div class="pw-sub">パスワードを入力してください</div>
    <div class="err" id="err-msg"></div>
    <input type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="btn-enter" onclick="checkPw()">ログイン</button>
    <button class="btn-back" onclick="goBack()">← 戻る</button>
    <div class="note" style="margin-top:12px">初期PW: <b>admin1234</b><br>管理者画面で変更できます</div>
  </div>
</div>

<script>
const DEFAULT_PW = 'admin1234';
function getAdminPw(){return localStorage.getItem('tb_admin_pw')||DEFAULT_PW;}

function goAdmin(){
  document.getElementById('role-screen').style.display='none';
  document.getElementById('pw-screen').style.display='block';
  document.getElementById('pw-input').focus();
  document.getElementById('err-msg').textContent='';
}
function goBack(){
  document.getElementById('pw-screen').style.display='none';
  document.getElementById('role-screen').style.display='block';
  document.getElementById('pw-input').value='';
}
function checkPw(){
  const val=document.getElementById('pw-input').value;
  const err=document.getElementById('err-msg');
  if(val===getAdminPw()){
    sessionStorage.setItem('tb_admin_auth','1');
    location.href='admin.html';
  }else{
    err.textContent='パスワードが違います';
    document.querySelector('.card').classList.remove('shake');
    void document.querySelector('.card').offsetWidth;
    document.querySelector('.card').classList.add('shake');
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}
</script>
</body>
</html>
